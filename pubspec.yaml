name: waily
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  dartz: ^0.10.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.4
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.2.2
  injectable: ^3.0.0
  json_annotation: ^4.11.0
  retrofit: ^4.9.2
  talker: ^5.1.16
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  injectable_generator: ^3.0.2
  retrofit_generator: ^10.2.5
  flutter_gen_runner: ^5.14.0
  mockito: ^5.6.4
  drift_dev: ^2.21.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/common/
    - assets/icons/chat/
    - assets/icons/nav/
    - assets/images/
  fonts:
    - family: Helvetica Neue
      fonts:
        - asset: assets/fonts/helvetica_neue/HelveticaNeue-Thin.otf
          weight: 100
        - asset: assets/fonts/helvetica_neue/HelveticaNeue-Light.otf
          weight: 300
        - asset: assets/fonts/helvetica_neue/HelveticaNeue-Roman.otf
          weight: 400
        - asset: assets/fonts/helvetica_neue/HelveticaNeue-Medium.otf
          weight: 500
        - asset: assets/fonts/helvetica_neue/HelveticaNeue-Bold.otf
          weight: 700

flutter_gen:
  output: lib/core/gen/
  line_length: 120
  assets:
    enabled: true
    outputs:
      class_name: Assets
  integrations:
    flutter_svg: true
