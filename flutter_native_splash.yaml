flutter_native_splash:
  # Solid fallback color in case the background image fails to load
  # (must still be set — flutter_native_splash requires it).
  color: "#020815"
  color_dark: "#020815"

  # Vertical gradient `#1D2534 → #020815` from the Figma "Bg Gradient"
  # token. PNG is generated by `scripts/build_splash_logo.py`.
  background_image: assets/splash/bg_gradient.png
  background_image_dark: assets/splash/bg_gradient.png

  # Combined logo + tagline image (built by the same script from
  # logo_original.png). Used for both platforms — flutter_native_splash
  # 2.4.x has no per-platform image override.
  image: assets/splash/logo.png
  image_dark: assets/splash/logo.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#020815"
    color_dark: "#020815"
    # Square 288dp canvas with the WAILY wordmark scaled to ~200dp
    # so it fits inside the system's circular icon clip.
    image: assets/splash/logo_android12.png
    image_dark: assets/splash/logo_android12.png

  fullscreen: false

# NOTE: every `flutter_native_splash:create` overwrites
# ios/Runner/Base.lproj/LaunchScreen.storyboard, which resets the view's
# backgroundColor to white. After regenerating, change the
# `<color key="backgroundColor" ...>` value back to #020815
# (`red="0.00784..." green="0.03137..." blue="0.08235..."`) — otherwise
# you get a white flash before Flutter takes over.
